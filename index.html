<!DOCTYPE html>
<html>
<head>
<title>Two Truths & A Lie - Team Game</title>

<style>
body{
font-family:Arial;
background:#f2f5f9;
padding:30px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:30px;
}

input,textarea,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:16px;
}

.post{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
}

.answers button{
margin:5px 0;
cursor:pointer;
}

.name{
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Team Two Truths & A Lie</h1>

<form id="form">
<input id="name" placeholder="Your Name" required>

<textarea id="s1" placeholder="Statement 1" required></textarea>
<textarea id="s2" placeholder="Statement 2" required></textarea>
<textarea id="s3" placeholder="Statement 3" required></textarea>

<p>Which one is the lie?</p>

<select id="correct">
<option value="0">Statement 1</option>
<option value="1">Statement 2</option>
<option value="2">Statement 3</option>
</select>

<button>Add Post</button>

</form>

<div id="posts"></div>

<script>

let posts = JSON.parse(localStorage.getItem("truthGame")) || []

function render(){

const container=document.getElementById("posts")
container.innerHTML=""

posts.forEach((p,i)=>{

const div=document.createElement("div")
div.className="post"

div.innerHTML=`
<div class="name">${p.name}</div>

<div class="answers">

<button onclick="guess(${i},0)">${p.items[0]}</button>

<button onclick="guess(${i},1)">${p.items[1]}</button>

<button onclick="guess(${i},2)">${p.items[2]}</button>

</div>
`

container.appendChild(div)

})

}

function guess(post,choice){

if(choice==posts[post].correct){
alert("Correct 🎉")
}else{
alert("Nope 😄 Try again")
}

}

document.getElementById("form").onsubmit=e=>{

e.preventDefault()

const name=document.getElementById("name").value

const items=[
document.getElementById("s1").value,
document.getElementById("s2").value,
document.getElementById("s3").value
]

const correct=document.getElementById("correct").value

posts.push({name,items,correct})

localStorage.setItem("truthGame",JSON.stringify(posts))

render()

e.target.reset()

}

render()

</script>

</body>
</html>
